<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANS APPAREL - Attendance System</title>
    <script type="module">
        import { supabase } from './js/supabase.js';
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data } = await supabase.from('employees').select('role').eq('id', session.user.id).single();
                window.location.href = data?.role === 'admin' ? 'dashboard.html' : 'attendance.html';
            } else {
                window.location.href = 'login.html';
            }
        }
        checkSession();
    </script>
</head>
<body style="background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
    <div style="text-align: center;">
        <div style="border: 4px solid #16A34A; border-top: 4px solid transparent; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
        <p style="color: #4B5563; font-weight: 500;">Loading SANS APPAREL System...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
